<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByRadii | Red de Apps con Dinámica de Integración Interactiva</title>
    <meta name="description" content="Infraestructura soberana para la integración profesional. ByRadii optimiza flujos de derivación y vinculación en entornos de alto tránsito a través de una red dinámica de tecnología aplicada.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #F9F9F9; /* El blanco limpio que le gustó a Ximena */
            font-family: 'Inter', sans-serif;
            color: #1A2B3C;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .by { font-weight: 300; }
        .radii { font-weight: 600; color: #1A2B3C; }

        .acronimo {
            font-size: 1.2rem;
            color: #B8860B; /* Dorado Oro para el acento */
            margin-bottom: 2rem;
            opacity: 0;
            animation: focusIn 3s forwards 1s;
        }

        .status {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-top: 3rem;
        }

        /* Animaciones sutiles de ingeniería */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes focusIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        .powered {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #AAA;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="by">By</span><span class="radii">Radii</span></h1>
        <div class="acronimo">Red de Apps con Dinámica de Integración Interactiva</div>
        
        <p style="max-width: 500px; margin: 0 auto; line-height: 1.6; font-weight: 300;">
            Infraestructura soberana para entornos de alto tránsito profesional.
        </p>

        <div class="status">Ingeniería en Progreso • Próximamente</div>
    </div>

    <div class="powered">Powered: ByRadii</div>

</body>
</html>
